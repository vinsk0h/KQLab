<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <title>KQLab</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" sizes="any" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--t4)">Loading KQLab...</div>
  </div>
  <!-- Chart.js must load BEFORE Monaco's AMD loader (vs/loader.js sets window.define.amd,
       which would cause chart.umd to register as AMD module instead of setting window.Chart) -->
  <script src="/js/chart.umd.min.js"></script>
  <!-- Monaco Editor AMD loader — KQL syntax highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script>
    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
  </script>
  <script src="/js/kql-monaco.js"></script>
  <!-- i18n doit être chargé en premier -->
  <script src="/js/i18n.js"></script>
  <!-- App scripts -->
  <script src="/js/data.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
